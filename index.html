<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サメザリオ - WebSocket Client (Square Map)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050d1a; /* 画面外の背景色 */
            color: white; 
            user-select: none; 
            display: flex;             /* 中央揃え設定 */
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { 
            display: block; 
            background-color: #0b1d3a; /* ゲームマップ（海）の色 */
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); 
            max-width: 100vw;          /* 画面幅に収める */
            max-height: 100vh;         /* 画面の高さに収める */
            object-fit: contain;       /* アスペクト比を維持 */
        }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        h2 { margin: 0 0 10px 0; font-size: 24px; text-shadow: 1px 1px 2px black; }
        .cp-container { margin-top: 5px; }
        .cp-label { font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 2px black; }
        #cp-bar-bg { width: 200px; height: 20px; background-color: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #cp-bar-fill { width: 100%; height: 100%; background-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2>スコア: <span id="score-text">0</span></h2>
        <div class="cp-container">
            <div class="cp-label">CP</div>
            <div id="cp-bar-bg"><div id="cp-bar-fill"></div></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score-text');
        const cpBarFill = document.getElementById('cp-bar-fill');

        // ★変更：マップを800x800の正方形に縮小
        const MAP_WIDTH = 800;
        const MAP_HEIGHT = 800;

        function resize() {
            canvas.width = MAP_WIDTH;
            canvas.height = MAP_HEIGHT;
        }
        window.addEventListener('resize', resize);
        resize(); // 初期化時に1回呼ぶ

        let myPlayerId = null;
        let gameState = { sharks: [], foods: [] };
        let isGameOver = false; 
        const input = { targetX: MAP_WIDTH/2, targetY: MAP_HEIGHT/2, isDashing: false };

        // ★マウス座標の取得を「キャンバス内の相対座標」になるよう修正（中央揃え対応）
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // 画面上の表示サイズと実際の内部サイズ(800)の比率を計算
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            input.targetX = (e.clientX - rect.left) * scaleX;
            input.targetY = (e.clientY - rect.top) * scaleY;
        });
        window.addEventListener('mousedown', () => input.isDashing = true);
        window.addEventListener('mouseup', () => input.isDashing = false);

        const ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = () => {
            console.log("Connected to server");
            ws.send(JSON.stringify({ type: "join", payload: { name: "Player" } }));
            setInterval(sendInput, 50);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "welcome") {
                myPlayerId = data.payload.player_id;
            } else if (data.type === "state") {
                if (!isGameOver) {
                    gameState = data.payload;
                    render();
                }
            } else if (data.type === "death") {
                isGameOver = true;
                renderGameOver(data.payload.final_score);
            }
        };

        function sendInput() {
            if (isGameOver || !myPlayerId || ws.readyState !== WebSocket.OPEN) return;
            const me = gameState.sharks?.find(s => s.id === myPlayerId);
            if (!me) return;

            const angle = Math.atan2(input.targetY - me.y, input.targetX - me.x);
            ws.send(JSON.stringify({
                type: "touch_input",
                payload: { angle: angle, is_dashing: input.isDashing }
            }));
        }

        function drawShark(ctx, x, y, radius, angle, isMe, isDashing) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            const bodyColor = isMe ? '#a0b0c0' : '#d05050';
            const finColor = isMe ? '#708090' : '#a03030';
            const l = radius;
            const w = radius * 0.5;

            if (isDashing) {
                ctx.beginPath();
                ctx.ellipse(0, 0, l * 1.2, w * 1.3, 0, 0, Math.PI * 2);
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ff3366';
                ctx.stroke();
            }

            ctx.fillStyle = finColor;
            ctx.beginPath();
            ctx.moveTo(l * 0.2, w * 0.8);
            ctx.lineTo(-l * 0.3, w * 1.8);
            ctx.lineTo(-l * 0.4, w * 0.8);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(l * 0.2, -w * 0.8);
            ctx.lineTo(-l * 0.3, -w * 1.8);
            ctx.lineTo(-l * 0.4, -w * 0.8);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(-l * 0.8, 0);
            ctx.lineTo(-l * 1.5, w * 0.8);
            ctx.lineTo(-l * 1.2, 0);
            ctx.lineTo(-l * 1.5, -w * 0.8);
            ctx.fill();

            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, l, w, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(l * 0.6, w * 0.4, radius * 0.1, 0, Math.PI * 2);
            ctx.arc(l * 0.6, -w * 0.4, radius * 0.1, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState.foods) {
                gameState.foods.forEach(food => {
                    ctx.beginPath();
                    ctx.arc(food.x, food.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#00ffcc';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#00ffcc';
                    ctx.fill();
                    ctx.closePath();
                });
                ctx.shadowBlur = 0;
            }

            if (gameState.sharks) {
                gameState.sharks.forEach(shark => {
                    const isMe = shark.id === myPlayerId;
                    drawShark(ctx, shark.x, shark.y, shark.radius, shark.angle, isMe, shark.is_dashing);

                    if (isMe) {
                        scoreText.innerText = shark.score;
                        cpBarFill.style.width = `${(shark.cp / 100) * 100}%`;
                        cpBarFill.style.backgroundColor = shark.cp === 0 ? "#ff3366" : "#00ffcc";
                    }
                });
            }
        }

        function renderGameOver(finalScore) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            
            ctx.font = "bold 60px sans-serif";
            ctx.fillText("ゲームオーバー", canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = "30px sans-serif";
            ctx.fillText(`最終スコア: ${finalScore}`, canvas.width / 2, canvas.height / 2 + 30);
            
            ctx.font = "20px sans-serif";
            ctx.fillText("ページをリロードして再挑戦", canvas.width / 2, canvas.height / 2 + 80);
        }
    </script>
</body>
</html>
