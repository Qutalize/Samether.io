<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>サメザリオ</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a1a2a;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game { width: 100vw; height: calc(var(--vh, 1vh) * 100); }

      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #030a14;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #88ccee;
        font-family: 'Times New Roman', 'Georgia', serif;
        font-size: 16px;
        letter-spacing: 4px;
        text-align: center;
        gap: 20px;
      }
      #rotate-overlay .rotate-title {
        font-size: 22px;
        letter-spacing: 8px;
        color: #88ccee;
        text-shadow: 0 0 12px rgba(34, 85, 136, 0.6);
      }
      #rotate-overlay .rotate-sub {
        color: #4a6a8a;
        font-size: 13px;
        letter-spacing: 3px;
      }
      #rotate-overlay .rotate-icon {
        font-size: 40px;
        opacity: 0.7;
      }

      @media (orientation: portrait) {
        #rotate-overlay { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-overlay">
      <div class="rotate-icon">🦈</div>
      <div class="rotate-title">S A M E T H E R . I O</div>
      <div class="rotate-sub">横向きでプレイしてください</div>
    </div>
    <div id="game"></div>
    <script>
      function setVH() {
        document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
      }
      setVH();
      window.addEventListener('resize', setVH);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
